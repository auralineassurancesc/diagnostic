document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n:1 / -1;}\n  .qz-field label{font-size:11px;font-weight:600;letter-spacing:.04em;color:#C2A15E;margin-bottom:5px;}\n  .qz-field input,.qz-field textarea{font-family:inherit;font-size:14.5px;color:#fff;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:11px 13px;outline:none;transition:border-color .2s;}\n  .qz-field input::placeholder,.qz-field textarea::placeholder{color:rgba(243,241,234,.4);}\n  .qz-field input:focus,.qz-field textarea:focus{border-color:#C2A15E;}\n  .qz-submit{grid-column:1 / -1;margin-top:4px;border:none;cursor:pointer;background:linear-gradient(90deg,#C2A15E,#D8B97E);color:#1B2A4D;font-family:inherit;font-size:15px;font-weight:bold;padding:14px;border-radius:12px;transition:filter .2s;}\n  .qz-submit:hover{filter:brightness(1.06);}\n  .qz-legal{font-size:11px;color:rgba(243,241,234,.45);margin-top:12px;line-height:1.5;text-align:center;}\n  .qz-thanks{text-align:center;padding:14px 0;}\n  .qz-thanks .ico{width:56px;height:56px;border-radius:50%;margin:0 auto 16px;background:rgba(194,161,94,.18);border:1px solid #C2A15E;display:flex;align-items:center;justify-content:center;}\n  .qz-thanks h3{font-family:'EB Garamond',Georgia,serif;font-size:22px;color:#fff;margin:0 0 8px;}\n  .qz-thanks p{font-size:14px;color:rgba(243,241,234,.78);margin:0 auto;max-width:30em;line-height:1.55;}\n  .qz-restart{margin-top:20px;background:transparent;border:1px solid rgba(194,161,94,.5);color:#C2A15E;font-family:inherit;font-size:13px;font-weight:600;padding:10px 20px;border-radius:99px;cursor:pointer;}\n  .qz-restart:hover{background:rgba(194,161,94,.15);color:#F3F1EA;}\n  @media (max-width:480px){\n    .qz-opts.cols2{grid-template-columns:1fr;}\n    .qz-q{font-size:21px;}\n    .qz-res-head{gap:16px;}\n    .qz-ring{width:100px;height:100px;}\n    .qz-ring .pct b{font-size:27px;}\n    .qz-fields{grid-template-columns:1fr;}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#1B2A4D;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:30px 18px 48px;font-family:Arial,sans-serif;\">\n  <div style=\"width:100%;max-width:600px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:26px;\">\n    <img src=\"23b81194-f8e9-4d66-9804-c5bb8d4137f4\" alt=\"Auraline Assurances\" style=\"height:34px;width:auto;display:block;\">\n    <span style=\"font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#C2A15E;font-weight:bold;\">Diagnostic<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"qz\" ref=\"{{ rootRef }}\">\n    <div class=\"qz-top\">\n      <button class=\"qz-back\" data-qz=\"back\" aria-label=\"Retour\">\n        <svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n      <div class=\"qz-bar\"><div class=\"qz-bar-fill\" data-qz=\"fill\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"qz-step\" data-qz=\"step\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div data-qz=\"body\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return { rootRef: (el) => { this._root = el; } };\n  }\n  componentDidMount() {\n    const root = this._root;\n    if (!root) return;\n    const TEL = '01 XX XX XX XX';\n    const MAIL = 'contact@auralineassurances.fr';\n    const GOLD = '#C2A15E';\n    const q = (sel) => root.querySelector(sel);\n    const body = q('[data-qz=\"body\"]');\n    const fill = q('[data-qz=\"fill\"]');\n    const stepEl = q('[data-qz=\"step\"]');\n    const backBtn = q('[data-qz=\"back\"]');\n\n    const PROFILES = {\n      particulier: { label:'Particulier', emo:'👤', questions:[\n        { q:'Votre logement', lead:'Vous êtes plutôt…', opts:[\n          { emo:'🏠', label:'Propriétaire', recos:['habitation'] },\n          { emo:'🔑', label:'Locataire', recos:['habitation'] } ] },\n        { q:'Possédez-vous un véhicule ?', opts:[\n          { emo:'🚗', label:'Oui', recos:['auto'] },\n          { emo:'🚌', label:'Non', recos:[] } ] },\n        { q:'Avez-vous des enfants ?', opts:[\n          { emo:'👨‍👩‍👧', label:'Oui', recos:['prevoyance'] },\n          { emo:'🙅', label:'Non', recos:[] } ] },\n        { q:'Avez-vous un crédit immobilier ?', opts:[\n          { emo:'🏦', label:'Oui', recos:['emprunteur'] },\n          { emo:'➖', label:'Non', recos:[] } ] },\n        { q:'Voyagez-vous régulièrement ?', opts:[\n          { emo:'✈️', label:'Oui', recos:['voyage'] },\n          { emo:'🏡', label:'Rarement', recos:[] } ] },\n        { q:'Avez-vous une complémentaire santé ?', opts:[\n          { emo:'✅', label:'Oui', recos:[] },\n          { emo:'❤️', label:'Non', recos:['sante'], gap:true } ] },\n        { q:'Un animal de compagnie ?', opts:[\n          { emo:'🐶', label:'Oui', recos:['animaux'] },\n          { emo:'➖', label:'Non', recos:[] } ] },\n        { q:\"Protéger vos proches en cas d'imprévu ?\", lead:'Décès, invalidité, perte de revenus…', opts:[\n          { emo:'🛡️', label:\"Oui, c'est important\", recos:['prevoyance','vie'], gap:true },\n          { emo:'🤔', label:'Pas une priorité', recos:[] } ] }\n      ]},\n      tns: { label:'Indépendant', emo:'💼', questions:[\n        { q:'Travaillez-vous seul ?', opts:[\n          { emo:'🧑‍💻', label:'Oui, seul', recos:[] },\n          { emo:'👥', label:'Avec une équipe', recos:['mutuelle_coll'] } ] },\n        { q:'Recevez-vous des clients ?', lead:'Dans un local ou chez vous', opts:[\n          { emo:'🤝', label:'Oui', recos:['rcpro','multipro'] },\n          { emo:'🚐', label:'Non / à distance', recos:['rcpro'] } ] },\n        { q:'Votre activité dépend-elle de votre capacité à travailler ?', opts:[\n          { emo:'⚠️', label:'Totalement', recos:['prevoyance_dir','perte_expl'], gap:true },\n          { emo:'➗', label:'En partie', recos:['prevoyance_dir'] } ] },\n        { q:'Utilisez-vous un véhicule professionnel ?', opts:[\n          { emo:'🚚', label:'Oui', recos:['vehicule_pro'] },\n          { emo:'➖', label:'Non', recos:[] } ] },\n        { q:'Avez-vous du matériel coûteux ?', lead:'Outils, informatique, stock…', opts:[\n          { emo:'💻', label:'Oui', recos:['materiel_pro'] },\n          { emo:'➖', label:'Non', recos:[] } ] },\n        { q:'Avez-vous une mutuelle santé adaptée TNS ?', opts:[\n          { emo:'✅', label:'Oui', recos:[] },\n          { emo:'❤️', label:'Non / pas sûr', recos:['mutuelle_tns'], gap:true } ] },\n        { q:'Êtes-vous couvert en Responsabilité Civile Pro ?', opts:[\n          { emo:'✅', label:'Oui', recos:[] },\n          { emo:'🛡️', label:'Non / je ne sais pas', recos:['rcpro'], gap:true } ] }\n      ]},\n      entreprise: { label:'Entreprise', emo:'🏢', questions:[\n        { q:'Combien de salariés ?', opts:[\n          { emo:'👤', label:'1 à 5', recos:['mutuelle_coll'] },\n          { emo:'👥', label:'6 à 20', recos:['mutuelle_coll','prevoyance_coll'] },\n          { emo:'🏢', label:'Plus de 20', recos:['mutuelle_coll','prevoyance_coll','homme_cle'] } ] },\n        { q:'Avez-vous des locaux ?', opts:[\n          { emo:'🏬', label:'Oui', recos:['multi_ent','locaux'] },\n          { emo:'🏠', label:'Non', recos:[] } ] },\n        { q:'Utilisez-vous des véhicules ?', opts:[\n          { emo:'🚚', label:'Une flotte', recos:['flotte'] },\n          { emo:'🚗', label:'Un ou deux', recos:['flotte'] },\n          { emo:'➖', label:'Aucun', recos:[] } ] },\n        { q:'Stockez-vous du matériel ou des marchandises ?', opts:[\n          { emo:'📦', label:'Oui', recos:['locaux','perte_expl'] },\n          { emo:'➖', label:'Non', recos:[] } ] },\n        { q:'Êtes-vous exposé au risque informatique ?', lead:'Données clients, paiements en ligne…', opts:[\n          { emo:'💻', label:'Oui', recos:['cyber'], gap:true },\n          { emo:'🤔', label:'Peu', recos:[] } ] },\n        { q:'Souhaitez-vous protéger vos dirigeants ?', opts:[\n          { emo:'👨‍💼', label:'Oui', recos:['homme_cle','prevoyance_coll'] },\n          { emo:'➖', label:'Non', recos:[] } ] },\n        { q:'Votre activité peut-elle être interrompue après un sinistre ?', opts:[\n          { emo:'⚠️', label:'Oui, fortement', recos:['perte_expl'], gap:true },\n          { emo:'➗', label:'Partiellement', recos:['perte_expl'] } ] }\n      ]}\n    };\n    const CATALOG = {\n      habitation:['🏠','Assurance habitation'], auto:['🚗','Assurance auto'],\n      sante:['❤️','Complémentaire santé'], prevoyance:['👨‍👩‍👧','Prévoyance famille'],\n      emprunteur:['🏦','Assurance emprunteur'], juridique:['⚖️','Protection juridique'],\n      voyage:['✈️','Assurance voyage'], animaux:['🐶','Assurance animaux'],\n      vie:['💰','Assurance vie'], rcpro:['🛡️','RC Professionnelle'],\n      prevoyance_dir:['👨‍⚕️','Prévoyance du dirigeant'], mutuelle_tns:['❤️','Mutuelle TNS'],\n      materiel_pro:['💻','Assurance matériel pro'], vehicule_pro:['🚚','Véhicule professionnel'],\n      multipro:['🏢','Multirisque professionnelle'], perte_expl:['💰',\"Perte d'exploitation\"],\n      multi_ent:['🏢','Multirisque entreprise'], flotte:['🚚','Flotte automobile'],\n      cyber:['💻','Cyber-assurance'], homme_cle:['👨‍💼','Assurance homme clé'],\n      mutuelle_coll:['❤️','Mutuelle collective'], prevoyance_coll:['📈','Prévoyance collective'],\n      locaux:['🏭','Locaux & matériel']\n    };\n    const ALWAYS = ['juridique'];\n    let state = { view:'intro', profile:null, qi:0, answers:[] };\n    const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');\n\n    backBtn.addEventListener('click', goBack);\n\n    function updateProgress() {\n      let pct, label;\n      if (state.view === 'intro') { pct = 6; label = ''; backBtn.classList.remove('show'); }\n      else if (state.view === 'question') {\n        const n = PROFILES[state.profile].questions.length;\n        pct = (state.qi / n) * 92 + 8;\n        label = (state.qi + 1) + '/' + n;\n        backBtn.classList.add('show');\n      } else { pct = 100; label = '✓'; backBtn.classList.remove('show'); }\n      fill.style.width = pct + '%';\n      stepEl.textContent = label;\n    }\n    function goBack() {\n      if (state.view === 'question') {\n        if (state.qi > 0) { state.qi--; state.answers.pop(); renderQuestion(); }\n        else { state.view = 'intro'; state.profile = null; state.answers = []; renderIntro(); }\n      } else if (state.view === 'result') {\n        state.view = 'question';\n        state.qi = PROFILES[state.profile].questions.length - 1;\n        renderQuestion();\n      }\n    }\n    function renderIntro() {\n      state.view = 'intro'; updateProgress();\n      let html = '<div class=\"qz-panel\">' +\n        '<div class=\"qz-kicker\">Diagnostic assurance · 1 min<\u002Fdiv>' +\n        '<h2 class=\"qz-q\">Évaluez votre niveau de protection<\u002Fh2>' +\n        '<p class=\"qz-lead\">Répondez à quelques questions et recevez des recommandations personnalisées, gratuitement et sans engagement.<\u002Fp>' +\n        '<div class=\"qz-opts\">';\n      ['particulier','tns','entreprise'].forEach(function (k) {\n        const p = PROFILES[k];\n        const sub = k==='particulier' ? 'Vous, votre famille, vos biens'\n                  : k==='tns' ? 'Artisan, commerçant, profession libérale, freelance'\n                  : 'TPE, PME, société';\n        html += '<button class=\"qz-opt\" data-profile=\"'+k+'\">' +\n                  '<span class=\"emo\">'+p.emo+'<\u002Fspan>' +\n                  '<span class=\"ot\"><b>'+p.label+'<\u002Fb><span>'+sub+'<\u002Fspan><\u002Fspan>' +\n                  '<span class=\"chk\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1B2A4D\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 13l4 4L19 7\"/><\u002Fsvg><\u002Fspan>' +\n                '<\u002Fbutton>';\n      });\n      html += '<\u002Fdiv><div class=\"qz-hint\">🔒 Vos réponses restent confidentielles.<\u002Fdiv><\u002Fdiv>';\n      body.innerHTML = html;\n      Array.prototype.forEach.call(body.querySelectorAll('[data-profile]'), function (b) {\n        b.addEventListener('click', function () {\n          state.profile = b.getAttribute('data-profile');\n          state.qi = 0; state.answers = [];\n          renderQuestion();\n        });\n      });\n    }\n    function renderQuestion() {\n      state.view = 'question'; updateProgress();\n      const qs = PROFILES[state.profile].questions;\n      const item = qs[state.qi];\n      const two = item.opts.length === 2;\n      let html = '<div class=\"qz-panel\">' +\n        '<div class=\"qz-kicker\">'+PROFILES[state.profile].emo+' '+PROFILES[state.profile].label+'<\u002Fdiv>' +\n        '<h2 class=\"qz-q\">'+esc(item.q)+'<\u002Fh2>' +\n        (item.lead ? '<p class=\"qz-lead\">'+esc(item.lead)+'<\u002Fp>' : '<div style=\"height:8px\"><\u002Fdiv>') +\n        '<div class=\"qz-opts'+(two?' cols2':'')+'\">';\n      item.opts.forEach(function (o, idx) {\n        html += '<button class=\"qz-opt\" data-opt=\"'+idx+'\">' +\n                  '<span class=\"emo\">'+o.emo+'<\u002Fspan>' +\n                  '<span class=\"ot\"><b>'+esc(o.label)+'<\u002Fb>'+(o.desc?'<span>'+esc(o.desc)+'<\u002Fspan>':'')+'<\u002Fspan>' +\n                  '<span class=\"chk\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1B2A4D\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 13l4 4L19 7\"/><\u002Fsvg><\u002Fspan>' +\n                '<\u002Fbutton>';\n      });\n      html += '<\u002Fdiv><\u002Fdiv>';\n      body.innerHTML = html;\n      Array.prototype.forEach.call(body.querySelectorAll('[data-opt]'), function (b) {\n        b.addEventListener('click', function () {\n          const idx = parseInt(b.getAttribute('data-opt'), 10);\n          state.answers[state.qi] = idx;\n          b.classList.add('sel');\n          setTimeout(function () {\n            if (state.qi < qs.length - 1) { state.qi++; renderQuestion(); }\n            else { renderResult(); }\n          }, 230);\n        });\n      });\n    }\n    function computeRecos() {\n      const qs = PROFILES[state.profile].questions;\n      const set = {}; let gaps = 0;\n      ALWAYS.forEach(function (r) { set[r] = true; });\n      state.answers.forEach(function (ansIdx, i) {\n        const opt = qs[i].opts[ansIdx];\n        (opt.recos || []).forEach(function (r) { set[r] = true; });\n        if (opt.gap) gaps++;\n      });\n      const list = Object.keys(set);\n      let score = 100 - (list.length * 5) - (gaps * 6);\n      if (score > 92) score = 92;\n      if (score < 38) score = 38;\n      return { list: list, score: score, gaps: gaps };\n    }\n    function renderResult() {\n      state.view = 'result'; updateProgress();\n      const r = computeRecos();\n      const label = r.score >= 80 ? 'Bien protégé' : r.score >= 60 ? 'Protégé' : 'À renforcer';\n      const C = 2 * Math.PI * 52;\n      const off = C * (1 - r.score / 100);\n      const chips = r.list.map(function (k) {\n        const c = CATALOG[k]; if (!c) return '';\n        return '<span class=\"qz-chip\"><span class=\"emo\">'+c[0]+'<\u002Fspan>'+esc(c[1])+'<\u002Fspan>';\n      }).join('');\n      const msg = r.gaps > 0\n        ? 'Certaines garanties importantes semblent manquer. Demandez gratuitement un bilan personnalisé avec un conseiller.'\n        : \"Votre couverture paraît solide. Un conseiller peut vérifier qu'aucune garantie clé ne manque et optimiser vos contrats.\";\n      const html = '<div class=\"qz-panel\">' +\n        '<div class=\"qz-kicker\">Votre diagnostic est terminé<\u002Fdiv>' +\n        '<div class=\"qz-res-head\">' +\n          '<div class=\"qz-ring\">' +\n            '<svg width=\"122\" height=\"122\" viewBox=\"0 0 122 122\">' +\n              '<circle cx=\"61\" cy=\"61\" r=\"52\" fill=\"none\" stroke=\"rgba(255,255,255,0.12)\" stroke-width=\"9\"/>' +\n              '<circle data-qz=\"arc\" cx=\"61\" cy=\"61\" r=\"52\" fill=\"none\" stroke=\"'+GOLD+'\" stroke-width=\"9\" stroke-linecap=\"round\" stroke-dasharray=\"'+C+'\" stroke-dashoffset=\"'+C+'\" style=\"transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)\"/>' +\n            '<\u002Fsvg>' +\n            '<div class=\"pct\"><b data-qz=\"pct\">0%<\u002Fb><span>'+label+'<\u002Fspan><\u002Fdiv>' +\n          '<\u002Fdiv>' +\n          '<div><h2 class=\"qz-res-t\">Indice de protection<\u002Fh2>' +\n          \"<p class=\\\"qz-res-s\\\">D'après vos réponses, voici les assurances les plus pertinentes pour votre situation.<\u002Fp><\u002Fdiv>\" +\n        '<\u002Fdiv>' +\n        '<div class=\"qz-reco-label\">Nos recommandations<\u002Fdiv>' +\n        '<div class=\"qz-chips\">'+chips+'<\u002Fdiv>' +\n        '<div class=\"qz-callout\">'+msg+'<\u002Fdiv>' +\n        '<div class=\"qz-form-t\">Recevez votre bilan gratuit<\u002Fdiv>' +\n        '<p class=\"qz-form-s\">Un conseiller vous recontacte sous 24 h, sans engagement.<\u002Fp>' +\n        '<form class=\"qz-fields\" data-qz=\"form\">' +\n          '<div class=\"qz-field\"><label>Prénom<\u002Flabel><input name=\"prenom\" required placeholder=\"Votre prénom\"><\u002Fdiv>' +\n          '<div class=\"qz-field\"><label>Nom<\u002Flabel><input name=\"nom\" required placeholder=\"Votre nom\"><\u002Fdiv>' +\n          '<div class=\"qz-field\"><label>E-mail<\u002Flabel><input name=\"email\" type=\"email\" required placeholder=\"vous@email.fr\"><\u002Fdiv>' +\n          '<div class=\"qz-field\"><label>Téléphone<\u002Flabel><input name=\"tel\" type=\"tel\" placeholder=\"06 12 34 56 78\"><\u002Fdiv>' +\n          '<div class=\"qz-field full\"><label>Message (facultatif)<\u002Flabel><textarea name=\"msg\" rows=\"2\" placeholder=\"Une précision sur votre situation ?\"><\u002Ftextarea><\u002Fdiv>' +\n          '<button class=\"qz-submit\" type=\"submit\">Demander mon bilan gratuit →<\u002Fbutton>' +\n        '<\u002Fform>' +\n        \"<div class=\\\"qz-legal\\\">En envoyant ce formulaire, vous acceptez d'être recontacté par notre cabinet. Vos données ne sont jamais cédées à des tiers.<\u002Fdiv>\" +\n        '<\u002Fdiv>';\n      body.innerHTML = html;\n      setTimeout(function () {\n        const arc = body.querySelector('[data-qz=\"arc\"]');\n        if (arc) arc.setAttribute('stroke-dashoffset', off);\n        let t0 = null; const dur = 1100; const pctEl = body.querySelector('[data-qz=\"pct\"]');\n        function tick(ts){ if(!t0)t0=ts; const p=Math.min((ts-t0)/dur,1); pctEl.textContent=Math.round(p*r.score)+'%'; if(p<1)requestAnimationFrame(tick); }\n        requestAnimationFrame(tick);\n      }, 60);\n      body.querySelector('[data-qz=\"form\"]').addEventListener('submit', function (e) {\n        e.preventDefault();\n        const f = e.target;\n        const recoNames = r.list.map(function(k){ return CATALOG[k] ? CATALOG[k][1] : ''; }).filter(Boolean).join(', ');\n        const sujet = 'Demande de bilan assurance — ' + PROFILES[state.profile].label;\n        const corps = 'Bonjour,\\r\\n\\r\\n' +\n          'Je souhaite un bilan personnalisé suite au diagnostic en ligne.\\r\\n\\r\\n' +\n          'Profil : ' + PROFILES[state.profile].label + '\\r\\n' +\n          'Indice de protection : ' + r.score + '%\\r\\n' +\n          'Recommandations : ' + recoNames + '\\r\\n\\r\\n' +\n          'Prénom : ' + f.prenom.value + '\\r\\n' +\n          'Nom : ' + f.nom.value + '\\r\\n' +\n          'E-mail : ' + f.email.value + '\\r\\n' +\n          'Téléphone : ' + f.tel.value + '\\r\\n' +\n          'Message : ' + f.msg.value + '\\r\\n';\n        try { window.location.href = 'mailto:' + MAIL + '?subject=' + encodeURIComponent(sujet) + '&body=' + encodeURIComponent(corps); } catch (err) {}\n        renderThanks(f.prenom.value);\n      });\n    }\n    function renderThanks(prenom) {\n      body.innerHTML = '<div class=\"qz-panel qz-thanks\">' +\n        '<div class=\"ico\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"'+GOLD+'\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 13l4 4L19 7\"/><\u002Fsvg><\u002Fdiv>' +\n        '<h3>Merci '+(prenom?esc(prenom):'')+' !<\u002Fh3>' +\n        '<p>Votre demande a bien été prise en compte. Un conseiller vous recontacte sous 24 h pour votre bilan personnalisé. Pour une urgence, appelez-nous au <b style=\"color:#C2A15E\">'+TEL+'<\u002Fb>.<\u002Fp>' +\n        '<button class=\"qz-restart\" data-qz=\"restart\">↻ Refaire le diagnostic<\u002Fbutton>' +\n        '<\u002Fdiv>';\n      fill.style.width = '100%';\n      body.querySelector('[data-qz=\"restart\"]').addEventListener('click', function () {\n        state = { view:'intro', profile:null, qi:0, answers:[] };\n        renderIntro();\n      });\n    }\n    renderIntro();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
